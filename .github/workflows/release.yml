name: release

# Flow: draft a release in the GitHub UI (create the v* tag there, write
# real patch notes) and publish it. Publishing triggers this workflow,
# which builds the binaries and attaches them to YOUR release — the notes
# are preserved; only the standard download/run instructions are appended.
# workflow_dispatch builds artifacts without touching any release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04: older glibc so the binary runs on most distros
          - os: ubuntu-22.04
            suffix: linux
          - os: windows-latest
            suffix: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install package and PyInstaller
        run: |
          uv venv --clear
          uv pip install . pyinstaller
      - name: Run tests
        run: |
          uv pip install pytest
          uv run pytest -q
      - name: Build one-file executable
        run: >
          uv run pyinstaller --onefile --name x4-analyzer
          --collect-data x4analyzer --collect-data plotly
          packaging/entry.py
      - name: Rename with platform suffix
        shell: bash
        run: |
          cd dist
          if [ -f x4-analyzer.exe ]; then
            mv x4-analyzer.exe x4-analyzer-${{ matrix.suffix }}.exe
          else
            mv x4-analyzer x4-analyzer-${{ matrix.suffix }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: x4-analyzer-${{ matrix.suffix }}
          path: dist/x4-analyzer-*

  attach:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          append_body: true
          body: |
            ---
            Standalone builds — no Python required. Download, run, and the
            dashboard opens in your browser.

            **Windows:** download `x4-analyzer-windows.exe` and double-click
            (a console window shows progress). SmartScreen may warn because
            the binary is unsigned — choose "More info" → "Run anyway".

            **Linux:** `chmod +x x4-analyzer-linux && ./x4-analyzer-linux`

            Your newest savegame is found automatically
            (`Documents\Egosoft\X4` on Windows, `~/.config/EgoSoft/X4` on
            Linux); use `--save <file>` or `--x4-user-dir <dir>` otherwise.
            The dashboard is written to `output/` in the current directory.

            Prefer running from source? `uvx --from
            git+https://github.com/adammartinez271828/x4-analysis x4-analyzer`
